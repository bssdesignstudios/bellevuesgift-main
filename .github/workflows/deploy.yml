name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          # MAIL_PASSWORD is stored in GitHub → Settings → Secrets → MAIL_PASSWORD
          # Never exposed in logs — passed to the remote shell as an env var.
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        with:
          host: 143.198.3.55
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # List the env vars the remote script is allowed to read
          envs: MAIL_PASSWORD
          timeout: 300s
          script: |
            git config --global --add safe.directory /var/www/bellevuesgift
            cd /var/www/bellevuesgift
            git pull origin main
            cd backend
            composer install --no-dev --optimize-autoloader
            npm install
            npm run build
            php artisan migrate --force
            php artisan db:seed --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart
            sudo systemctl reload php8.4-fpm
            chown -R www-data:www-data /var/www/bellevuesgift

            # ── SMTP / Mail configuration ──────────────────────────────────────
            # Write Titan SMTP settings into .env (idempotent — sed replaces existing
            # values; grep+append handles missing keys on first run).
            # The MAIL_PASSWORD value comes from GitHub Secret via the envs parameter
            # and is NEVER written into this workflow file or printed to logs.
            if [ -n "$MAIL_PASSWORD" ]; then
              echo "Configuring Titan SMTP..."
              # Update or insert each mail key
              grep -q '^MAIL_MAILER=' .env && sed -i 's|^MAIL_MAILER=.*|MAIL_MAILER=smtp|' .env || echo 'MAIL_MAILER=smtp' >> .env
              grep -q '^MAIL_SCHEME=' .env && sed -i 's|^MAIL_SCHEME=.*|MAIL_SCHEME=ssl|' .env || echo 'MAIL_SCHEME=ssl' >> .env
              grep -q '^MAIL_HOST=' .env && sed -i 's|^MAIL_HOST=.*|MAIL_HOST=smtp0101.titan.email|' .env || echo 'MAIL_HOST=smtp0101.titan.email' >> .env
              grep -q '^MAIL_PORT=' .env && sed -i 's|^MAIL_PORT=.*|MAIL_PORT=465|' .env || echo 'MAIL_PORT=465' >> .env
              grep -q '^MAIL_ENCRYPTION=' .env && sed -i "s|^MAIL_ENCRYPTION=.*|MAIL_ENCRYPTION=ssl|" .env || echo 'MAIL_ENCRYPTION=ssl' >> .env
              grep -q '^MAIL_USERNAME=' .env && sed -i 's|^MAIL_USERNAME=.*|MAIL_USERNAME=sales@bellevuegifts.com|' .env || echo 'MAIL_USERNAME=sales@bellevuegifts.com' >> .env
              grep -q '^MAIL_PASSWORD=' .env && sed -i "s|^MAIL_PASSWORD=.*|MAIL_PASSWORD=$MAIL_PASSWORD|" .env || echo "MAIL_PASSWORD=$MAIL_PASSWORD" >> .env
              grep -q '^MAIL_FROM_ADDRESS=' .env && sed -i 's|^MAIL_FROM_ADDRESS=.*|MAIL_FROM_ADDRESS=sales@bellevuegifts.com|' .env || echo 'MAIL_FROM_ADDRESS=sales@bellevuegifts.com' >> .env
              grep -q '^MAIL_FROM_NAME=' .env && sed -i 's|^MAIL_FROM_NAME=.*|MAIL_FROM_NAME="Bellevue Gifts \& Supplies"|' .env || echo 'MAIL_FROM_NAME="Bellevue Gifts & Supplies"' >> .env
              echo "Titan SMTP configured."
            else
              echo "MAIL_PASSWORD secret not set — skipping SMTP configuration."
            fi

            # ── Maintenance mode (default off) ────────────────────────────────
            grep -q '^MAINTENANCE_MODE=' .env && sed -i 's|^MAINTENANCE_MODE=.*|MAINTENANCE_MODE=false|' .env || echo 'MAINTENANCE_MODE=false' >> .env

            # ── APP_NAME ──────────────────────────────────────────────────────
            grep -q '^APP_NAME=' .env && sed -i 's|^APP_NAME=.*|APP_NAME="Bellevue Gifts \& Supplies"|' .env || echo 'APP_NAME="Bellevue Gifts & Supplies"' >> .env

            # Re-cache config after env changes
            php artisan config:cache

            # Sync Nginx config from repo (preserves SSL blocks added by certbot)
            # Only update the base config if it has changed
            if ! diff -q /var/www/bellevuesgift/docs/nginx-dual-domain.conf /etc/nginx/sites-available/bellevuesgift.base 2>/dev/null; then
              echo "Updating Nginx base config..."
              cp /var/www/bellevuesgift/docs/nginx-dual-domain.conf /etc/nginx/sites-available/bellevuesgift.base
              # If certbot hasn't set up SSL yet, use the base config directly
              if ! grep -q 'ssl_certificate' /etc/nginx/sites-available/bellevuesgift 2>/dev/null; then
                cp /var/www/bellevuesgift/docs/nginx-dual-domain.conf /etc/nginx/sites-available/bellevuesgift
                nginx -t && systemctl reload nginx
                apt install -y certbot python3-certbot-nginx 2>/dev/null || true
                certbot --nginx -d bellevuegifts.com -d www.bellevuegifts.com --non-interactive --agree-tos --email bellevuegifts242@gmail.com 2>/dev/null || true
                certbot --nginx -d bellevuepos.cloud -d www.bellevuepos.cloud --non-interactive --agree-tos --email bellevuegifts242@gmail.com 2>/dev/null || true
              else
                # SSL already configured — update redirect in existing config
                sed -i 's|return 302 /pos;|return 302 /pos/login;|g' /etc/nginx/sites-available/bellevuesgift
                nginx -t && systemctl reload nginx
              fi
              cd /var/www/bellevuesgift/backend
              sed -i 's|APP_URL=.*|APP_URL=https://bellevuegifts.com|' .env
              grep -q 'SESSION_SECURE_COOKIE' .env || echo 'SESSION_SECURE_COOKIE=true' >> .env
              sed -i 's|SESSION_SECURE_COOKIE=.*|SESSION_SECURE_COOKIE=true|' .env
              php artisan config:cache
            fi

            echo "Deployment complete"
