name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 143.198.3.55
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          script: |
            git config --global --add safe.directory /var/www/bellevuesgift
            cd /var/www/bellevuesgift
            git pull origin main
            cd backend
            composer install --no-dev --optimize-autoloader
            npm install
            npm run build
            php artisan migrate --force
            php artisan db:seed --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart
            sudo systemctl reload php8.4-fpm
            chown -R www-data:www-data /var/www/bellevuesgift

            # Sync Nginx config from repo (preserves SSL blocks added by certbot)
            # Only update the base config if it has changed
            if ! diff -q /var/www/bellevuesgift/docs/nginx-dual-domain.conf /etc/nginx/sites-available/bellevuesgift.base 2>/dev/null; then
              echo "Updating Nginx base config..."
              cp /var/www/bellevuesgift/docs/nginx-dual-domain.conf /etc/nginx/sites-available/bellevuesgift.base
              # If certbot hasn't set up SSL yet, use the base config directly
              if ! grep -q 'ssl_certificate' /etc/nginx/sites-available/bellevuesgift 2>/dev/null; then
                cp /var/www/bellevuesgift/docs/nginx-dual-domain.conf /etc/nginx/sites-available/bellevuesgift
                nginx -t && systemctl reload nginx
                apt install -y certbot python3-certbot-nginx 2>/dev/null || true
                certbot --nginx -d bellevuegifts.com -d www.bellevuegifts.com --non-interactive --agree-tos --email bellevuegifts242@gmail.com 2>/dev/null || true
                certbot --nginx -d bellevuepos.cloud -d www.bellevuepos.cloud --non-interactive --agree-tos --email bellevuegifts242@gmail.com 2>/dev/null || true
              else
                # SSL already configured — update redirect in existing config
                sed -i 's|return 302 /pos;|return 302 /pos/login;|g' /etc/nginx/sites-available/bellevuesgift
                nginx -t && systemctl reload nginx
              fi
              cd /var/www/bellevuesgift/backend
              sed -i 's|APP_URL=.*|APP_URL=https://bellevuegifts.com|' .env
              grep -q 'SESSION_SECURE_COOKIE' .env || echo 'SESSION_SECURE_COOKIE=true' >> .env
              sed -i 's|SESSION_SECURE_COOKIE=.*|SESSION_SECURE_COOKIE=true|' .env
              php artisan config:cache
            fi

            echo "Deployment complete"
