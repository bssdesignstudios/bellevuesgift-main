# Bellevue Dual-Domain Nginx Configuration
# Copy this to: /etc/nginx/sites-available/bellevuesgift
# Then: nginx -t && systemctl reload nginx

# --- bellevuegifts.com (Public Storefront) ---
server {
    listen 80;
    server_name bellevuegifts.com www.bellevuegifts.com;
    root /var/www/bellevuesgift/backend/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    index index.php index.html;
    charset utf-8;
    client_max_body_size 20M;

    # Redirect www → non-www
    if ($host = www.bellevuegifts.com) {
        return 301 $scheme://bellevuegifts.com$request_uri;
    }

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must be served from root
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* { deny all; }
}

# --- bellevuepos.cloud (Staff POS Terminal) ---
server {
    listen 80;
    server_name bellevuepos.cloud www.bellevuepos.cloud;
    root /var/www/bellevuesgift/backend/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    index index.php index.html;
    charset utf-8;
    client_max_body_size 20M;

    # Redirect www → non-www
    if ($host = www.bellevuepos.cloud) {
        return 301 $scheme://bellevuepos.cloud$request_uri;
    }

    # POS domain root → redirect to /pos
    location = / {
        return 302 /pos;
    }

    # Serve POS-specific manifest (manifest-pos.json as /manifest.json)
    location = /manifest.json {
        alias /var/www/bellevuesgift/backend/public/manifest-pos.json;
        add_header Content-Type "application/manifest+json";
    }

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must be served from root
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* { deny all; }
}

# --- IP fallback (keeps direct IP access working) ---
